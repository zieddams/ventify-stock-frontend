name: Frontend CI

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify app version sync
        run: npm run check:app-version

      - name: Run unit tests
        run: npm test

      - name: Build production bundle
        run: npm run build
